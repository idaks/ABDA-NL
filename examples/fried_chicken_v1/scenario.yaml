title: Fried Chicken V1
description: >
  A minimal four-argument scenario adapted from an ArgBlazer demo,
  encoded as a preference-free (all block 1) ASPIC- rule set. The
  air-fryer undercut alone is enough to defeat the soggy chain --
  no preference tiers needed. Baseline grounded matches ArgBlazer's
  {fryer} exactly: crispy is accepted and the to-go / dine-in pair
  stays undecided. Suspend the air-fryer assumption and the reduced
  AF still leaves to-go / dine-in undecided (exactly ArgBlazer's
  behaviour with the fryer argument removed) while crispy flips to
  rejected. Contrast with V2, which uses tiered preference blocks
  (1 / 2 / 3) and makes to-go decisively rejected when the air fryer
  is off. V1 is the more ArgBlazer-faithful variant; V2 is the more
  pedagogically decisive one.

facts:
  want_chicken:
    description: we want fried chicken for this meal
    category: ordering
  box_transport:
    description: to-go fried chicken is transported in a closed takeaway box
    category: transport
    source: fried-chicken-restaurant packaging notes (clamshells, foil-lined bags, buckets)

assumptions:
  have_airfryer:
    description: there is a working air fryer available at home
    negated_description: there is no working air fryer available at home
    category: home-kitchen
    source: home kitchen inventory
    active: true
    block: 1

conclusions:
  order_to_go:
    description: order the fried chicken to-go (and eat at home)
    negated_description: dine in at the restaurant instead of ordering to-go
    category: ordering
  crispy:
    description: the fried chicken will be crispy when eaten
    negated_description: the fried chicken will be soggy when eaten
    category: quality

rules:
  togo_by_default:
    type: defeasible
    premises: [want_chicken]
    conclusion: order_to_go
    category: ordering
    source: default preference for eating at home
    block: 1
  dinein_by_default:
    type: defeasible
    premises: [want_chicken]
    conclusion: -order_to_go
    category: ordering
    source: default preference for eating at the restaurant
    block: 1
  box_softens:
    type: defeasible
    premises: [box_transport]
    conclusion: -crispy
    category: quality
    source: transport-and-crispiness guide -- closed containers trap steam, the breading reabsorbs moisture, so the chicken is soggy by the time it is eaten
    negated_description: the transport-to-soggy-when-eaten inference does not apply here
    block: 1
  avoid_soggy_food:
    type: defeasible
    premises: [-crispy]
    conclusion: -order_to_go
    category: ordering
    source: texture-preference principle -- do not order food that will be eaten soggy
    block: 1
  airfryer_rescues_crisp:
    type: defeasible
    premises: [have_airfryer]
    conclusion: -box_softens
    category: home-kitchen
    source: Wikipedia air fryer -- 3-5 minutes at 180-200 C restores crispiness of takeaway fried chicken; the transport-to-soggy-when-eaten inference no longer applies
    block: 1
  airfryer_makes_crispy:
    type: defeasible
    premises: [have_airfryer]
    conclusion: crispy
    category: home-kitchen
    source: Wikipedia air fryer and transport-and-crispiness guide -- reheating reverses moisture reabsorption so the chicken is crispy when eaten
    block: 1

corpus:
  - wikipedia_air_fryer.txt
  - wikipedia_fried_chicken_restaurant.txt
  - home_kitchen_notes.txt
  - transport_and_crispiness.txt
